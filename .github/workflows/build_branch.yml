---
name: Build Branch APK
on:
  workflow_dispatch:
env:
  TERM: dumb
  GRADLE_OPTS: "-Dorg.gradle.daemon=false"
  TMPDIR: "/tmp"
jobs:
  build-debug-apk:
    name: Build Debug APK
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-java@v5.2.0
        with:
          distribution: 'temurin'
          java-version: '21'
      - uses: android-actions/setup-android@v3.2.2
        with:
          cmdline-tools-version: 13114758
      - name: Install NDK
        run: echo "y" | sdkmanager "ndk;29.0.14206865"
      - uses: gradle/actions/setup-gradle@v5
      - name: setup
        run: ./scripts/ci/ci_setup.sh
      - name: Build debug APK
        run: ./gradlew :addons:languages:english:assembleDebug
      - uses: actions/upload-artifact@v6.0.0
        with:
          name: english-debug-apk
          path: addons/languages/english/pack/build/outputs/apk/debug/*.apk
